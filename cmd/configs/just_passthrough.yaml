# =============================================================================
# Context Gateway - Just Passthrough Configuration
# =============================================================================
# Everything is passthrough - no compression, no summarization, no discovery.
# Raw traffic flows straight through to the upstream provider.
# =============================================================================

metadata:
  name: "Just Passthrough"
  description: "No optimizations - pure passthrough mode"
  strategy: "passthrough"

server:
  port: ${GATEWAY_PORT:-18080}
  read_timeout: 30s
  write_timeout: 1000s

urls:
  gateway: "http://localhost:${GATEWAY_PORT:-18080}"
  compresr: "${COMPRESR_BASE_URL:-https://api.compresr.ai}"

# =============================================================================
# PROVIDERS
# =============================================================================

providers:
  anthropic:
    api_key: "${ANTHROPIC_API_KEY:-}"
    model: "claude-haiku-4-5"

  openai:
    auth: "oauth"
    model: "gpt-4o-mini"

# =============================================================================
# PREEMPTIVE SUMMARIZATION (Disabled)
# =============================================================================

preemptive:
  enabled: false

  log_dir: "${SESSION_DIR:-logs}"
  compaction_log_path: "${SESSION_COMPACTION_LOG:-logs/history_compaction.jsonl}"

  summarizer:
    strategy: "compresr"
    max_tokens: 4096
    timeout: 60s
    token_estimate_ratio: 4
    compresr:
      endpoint: "/api/compress/history/"
      api_key: "${COMPRESR_API_KEY:-}"
      model: "hcc_espresso_v1"
      timeout: 60s

  session:
    summary_ttl: 3h
    hash_message_count: 3

# =============================================================================
# COMPRESSION PIPES (All Disabled)
# =============================================================================

pipes:
  # Tool Output Compression - Disabled
  tool_output:
    enabled: false
    strategy: "compresr"
    enable_expand_context: false
    include_expand_hint: false
    min_bytes: 8192
    max_bytes: 512000
    target_compression_ratio: 0.5
    compresr:
      endpoint: "/api/compress/tool-output/"
      api_key: "${COMPRESR_API_KEY:-}"
      model: "toc_latte_v1"
      timeout: 30s

  # Tool Discovery - Disabled
  tool_discovery:
    enabled: false
    strategy: "compresr"
    min_tools: 5
    max_tools: 25
    target_ratio: 0.8
    compresr:
      endpoint: "/api/compress/tool-discovery/"
      api_key: "${COMPRESR_API_KEY:-}"
      model: "tdc_coldbrew_v1"
      timeout: 20s

# =============================================================================
# COST CONTROL (Disabled)
# =============================================================================

cost_control:
  enabled: false
  session_cap: 0
  global_cap: 0

# =============================================================================
# SLACK NOTIFICATIONS (Disabled)
# =============================================================================

slack:
  enabled: false

# =============================================================================
# STORE
# =============================================================================

store:
  type: "memory"
  ttl: 1h

# =============================================================================
# MONITORING
# =============================================================================

monitoring:
  log_level: "off"
  log_format: "console"
  log_output: "stdout"
  telemetry_enabled: true
  verbose_payloads: false
  telemetry_path: "${SESSION_TELEMETRY_LOG:-logs/telemetry.jsonl}"
  compression_log_path: "${SESSION_COMPRESSION_LOG:-logs/tool_output_compression.jsonl}"
  tool_discovery_log_path: "${SESSION_TOOL_DISCOVERY_LOG:-logs/tool_discovery.jsonl}"
